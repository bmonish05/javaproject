<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="form-container">
        <div class="form-box">
            <div class="form-header">
                <h1>Admin Portal</h1>
                <a href="index.html" class="back-btn">← Back</a>
            </div>

            <!-- Login Form -->
            <form id="adminLoginForm" class="form active-form">
                <h2>Admin Login</h2>
                
                <div class="form-group">
                    <label for="adminLoginId">Admin ID</label>
                    <input 
                        type="text" 
                        id="adminLoginId" 
                        placeholder="Enter your Admin ID"
                        required
                    >
                    <span class="error-msg" id="adminLoginIdError"></span>
                </div>

                <div class="form-group">
                    <label for="adminLoginPassword">Password</label>
                    <div class="password-container">
                        <input 
                            type="password" 
                            id="adminLoginPassword" 
                            placeholder="Enter your password"
                            required
                        >
                        <button type="button" class="toggle-password" onclick="togglePassword('adminLoginPassword')">👁️</button>
                    </div>
                    <span class="error-msg" id="adminLoginPasswordError"></span>
                </div>

                <button type="submit" class="btn btn-primary">Login</button>

                <div class="form-footer">
                    <p>Don't have an account? 
                        <a href="javascript:void(0)" onclick="switchToAdminSignup()">Sign up here</a>
                    </p>
                </div>
            </form>

            <!-- Signup Form -->
            <form id="adminSignupForm" class="form">
                <h2>Create Admin Account</h2>
                
                <div class="form-group">
                    <label for="adminSignupId">Admin ID</label>
                    <input 
                        type="text" 
                        id="adminSignupId" 
                        placeholder="Enter your Admin ID"
                        required
                    >
                    <span class="error-msg" id="adminSignupIdError"></span>
                </div>

                <div class="form-group">
                    <label for="adminEmail">Email</label>
                    <input 
                        type="email" 
                        id="adminEmail" 
                        placeholder="Enter your email"
                        required
                    >
                    <span class="error-msg" id="adminSignupEmailError"></span>
                </div>

                <div class="form-group">
                    <label for="adminSignupPassword">Password</label>
                    <div class="password-container">
                        <input 
                            type="password" 
                            id="adminSignupPassword" 
                            placeholder="Enter a strong password"
                            required
                        >
                        <button type="button" class="toggle-password" onclick="togglePassword('adminSignupPassword')">👁️</button>
                    </div>
                    <span class="error-msg" id="adminSignupPasswordError"></span>
                </div>

                <div class="form-group">
                    <label for="adminConfirmPassword">Confirm Password</label>
                    <div class="password-container">
                        <input 
                            type="password" 
                            id="adminConfirmPassword" 
                            placeholder="Confirm your password"
                            required
                        >
                        <button type="button" class="toggle-password" onclick="togglePassword('adminConfirmPassword')">👁️</button>
                    </div>
                    <span class="error-msg" id="adminSignupConfirmError"></span>
                </div>

                <div class="form-group">
                    <label for="adminKey">Admin Secret Key</label>
                    <input 
                        type="password" 
                        id="adminKey" 
                        placeholder="Enter admin secret key"
                        required
                    >
                    <span class="error-msg" id="adminKeyError"></span>
                </div>

                <button type="submit" class="btn btn-primary">Create Account</button>

                <div class="form-footer">
                    <p>Already have an account? 
                        <a href="javascript:void(0)" onclick="switchToAdminLogin()">Login here</a>
                    </p>
                </div>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        function switchToAdminLogin() {
            document.getElementById('adminSignupForm').classList.remove('active-form');
            document.getElementById('adminLoginForm').classList.add('active-form');
        }

        function switchToAdminSignup() {
            document.getElementById('adminLoginForm').classList.remove('active-form');
            document.getElementById('adminSignupForm').classList.add('active-form');
        }

        document.getElementById('adminLoginForm').addEventListener('submit', handleAdminLogin);
        document.getElementById('adminSignupForm').addEventListener('submit', handleAdminSignup);
    </script>
</body>
</html>
