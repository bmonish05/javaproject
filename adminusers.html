<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.min.js"></script>
    <title>Users Management - QuizMaster Pro</title>
</head>
<body>
    <nav class="navbar">
        <div class="nav-content">
            <h2 class="nav-title"><i class="fas fa-graduation-cap"></i> QuizMaster Pro - Admin</h2>
            <div class="nav-stats">
                <button class="btn back-btn" id="backBtn"><i class="fas fa-arrow-left"></i> Back to Admin</button>
                <button class="btn logout-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</button>
            </div>
        </div>
    </nav>

    <div class="admin-container" style="margin-top: 100px;">
        <div class="admin-header">
            <h1>👥 User Management</h1>
            <p>Manage all registered users and export data</p>
        </div>

        <div class="users-management">
            <div class="management-header">
                <h2><i class="fas fa-users"></i> All Registered Users</h2>
                <div class="management-actions">
                    <button class="btn" id="exportExcelBtn" style="width: auto; padding: 10px 20px;">
                        <i class="fas fa-file-excel"></i> Export to Excel
                    </button>
                    <button class="btn" id="exportPdfBtn" style="width: auto; padding: 10px 20px; background: linear-gradient(135deg, #dc3545 0%, #c82333 100%);">
                        <i class="fas fa-file-pdf"></i> Export to PDF
                    </button>
                </div>
            </div>

            <div class="users-stats">
                <div class="stat-card">
                    <i class="fas fa-users"></i>
                    <div>
                        <h4>Total Users</h4>
                        <p id="totalUsers">0</p>
                    </div>
                </div>
                <div class="stat-card">
                    <i class="fas fa-check-circle"></i>
                    <div>
                        <h4>Active Users</h4>
                        <p id="activeUsers">0</p>
                    </div>
                </div>
                <div class="stat-card">
                    <i class="fas fa-lock"></i>
                    <div>
                        <h4>Admin Users</h4>
                        <p id="adminUsers">0</p>
                    </div>
                </div>
            </div>

            <div class="table-responsive">
                <table class="users-data-table">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Full Name</th>
                            <th>Email ID</th>
                            <th>Password</th>
                            <th>Role</th>
                            <th>Account Created</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="usersTableBody">
                        <tr>
                            <td colspan="8" style="text-align: center; padding: 40px;">
                                <i class="fas fa-spinner fa-spin"></i> Loading users...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const currentUser = JSON.parse(localStorage.getItem('currentUser'));
            
            if (!currentUser || !currentUser.isAdmin) {
                window.location.href = 'login.html';
                return;
            }

            loadUsers();
            setupButtons();
        });

        function loadUsers() {
            const users = JSON.parse(localStorage.getItem('users')) || [];
            
            // Update stats
            document.getElementById('totalUsers').textContent = users.length;
            document.getElementById('activeUsers').textContent = users.filter(u => u.status !== 'deleted').length;
            document.getElementById('adminUsers').textContent = users.filter(u => u.isAdmin).length;

            // Populate table
            let html = '';
            users.forEach((user, idx) => {
                const createdDate = new Date().toLocaleDateString();
                const rolebadge = user.isAdmin ? '<span class="role-badge admin-badge">Admin</span>' : '<span class="role-badge student-badge">Student</span>';
                const statusBadge = '<span class="status-badge active-badge">Active</span>';
                
                html += `
                    <tr>
                        <td>${idx + 1}</td>
                        <td><strong>${user.name}</strong></td>
                        <td>${user.email}</td>
                        <td>
                            <div class="password-cell">
                                <span class="password-mask" id="pass-${idx}">••••••••</span>
                                <button class="btn-toggle-pass" onclick="togglePassword(${idx}, '${user.password}')">
                                    <i class="fas fa-eye"></i>
                                </button>
                            </div>
                        </td>
                        <td>${rolebadge}</td>
                        <td>${createdDate}</td>
                        <td>${statusBadge}</td>
                        <td>
                            <button class="action-btn delete-btn" onclick="deleteUser('${user.email}')">
                                <i class="fas fa-trash"></i> Delete
                            </button>
                        </td>
                    </tr>
                `;
            });

            document.getElementById('usersTableBody').innerHTML = html;
        }

        function togglePassword(idx, password) {
            const passEl = document.getElementById(`pass-${idx}`);
            if (passEl.textContent === '••••••••') {
                passEl.textContent = password;
            } else {
                passEl.textContent = '••••••••';
            }
        }

        function deleteUser(email) {
            if (confirm('Are you sure you want to delete this user?')) {
                let users = JSON.parse(localStorage.getItem('users')) || [];
                users = users.filter(u => u.email !== email);
                localStorage.setItem('users', JSON.stringify(users));
                loadUsers();
                alert('User deleted successfully!');
            }
        }

        function setupButtons() {
            document.getElementById('exportExcelBtn').addEventListener('click', exportToExcel);
            document.getElementById('exportPdfBtn').addEventListener('click', exportToPdf);
            document.getElementById('backBtn').addEventListener('click', () => window.location.href = 'admin.html');
            document.getElementById('logoutBtn').addEventListener('click', () => {
                localStorage.removeItem('currentUser');
                window.location.href = 'login.html';
            });
        }

        function exportToExcel() {
            const users = JSON.parse(localStorage.getItem('users')) || [];
            
            // Prepare data
            const data = [
                ['#', 'Full Name', 'Email ID', 'Password', 'Role', 'Account Created', 'Status']
            ];

            users.forEach((user, idx) => {
                data.push([
                    idx + 1,
                    user.name,
                    user.email,
                    user.password,
                    user.isAdmin ? 'Admin' : 'Student',
                    new Date().toLocaleDateString(),
                    'Active'
                ]);
            });

            // Create worksheet
            const ws = XLSX.utils.aoa_to_sheet(data);
            
            // Set column widths
            ws['!cols'] = [
                { wch: 5 },
                { wch: 20 },
                { wch: 30 },
                { wch: 20 },
                { wch: 10 },
                { wch: 18 },
                { wch: 10 }
            ];

            // Create workbook
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, 'Users');

            // Style the header
            const headerStyle = {
                font: { bold: true, color: { rgb: 'FFFFFF' } },
                fill: { fgColor: { rgb: '667EEA' } },
                alignment: { horizontal: 'center', vertical: 'center' }
            };

            // Download
            XLSX.writeFile(wb, `QuizMaster_Users_${new Date().toISOString().split('T')[0]}.xlsx`);
            
            alert('✅ Excel file downloaded successfully!');
        }

        function exportToPdf() {
            const users = JSON.parse(localStorage.getItem('users')) || [];
            
            let htmlContent = `
                <html>
                <head>
                    <style>
                        body { font-family: Arial, sans-serif; margin: 20px; }
                        h1 { color: #667eea; text-align: center; }
                        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
                        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
                        th { background-color: #667eea; color: white; font-weight: bold; }
                        tr:nth-child(even) { background-color: #f9f9f9; }
                        .footer { text-align: center; margin-top: 30px; font-size: 12px; color: #666; }
                    </style>
                </head>
                <body>
                    <h1>QuizMaster Pro - User List</h1>
                    <table>
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>Full Name</th>
                                <th>Email ID</th>
                                <th>Password</th>
                                <th>Role</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody>
            `;

            users.forEach((user, idx) => {
                htmlContent += `
                    <tr>
                        <td>${idx + 1}</td>
                        <td>${user.name}</td>
                        <td>${user.email}</td>
                        <td>${user.password}</td>
                        <td>${user.isAdmin ? 'Admin' : 'Student'}</td>
                        <td>Active</td>
                    </tr>
                `;
            });

            htmlContent += `
                        </tbody>
                    </table>
                    <div class="footer">
                        <p>Generated on: ${new Date().toLocaleString()}</p>
                        <p>Total Users: ${users.length}</p>
                    </div>
                </body>
                </html>
            `;

            const printWindow = window.open('', '', 'height=600,width=800');
            printWindow.document.write(htmlContent);
            printWindow.document.close();
            printWindow.print();
        }
    </script>
</body>
</html>
