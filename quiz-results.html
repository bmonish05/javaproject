<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduPortal — Quiz Results</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root{--bg:#080c14;--surface:rgba(255,255,255,0.04);--border:rgba(255,255,255,0.08);--accent:#63b3ed;--accent2:#9f7aea;--accent3:#68d391;--accent4:#f6ad55;--accent5:#fb7185;--text:#e8eaf0;--muted:#6b7494;}
        *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
        html,body{width:100%;height:100%;overflow:hidden;font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);}
        #bgCanvas{position:fixed;inset:0;z-index:0;pointer-events:none;}
        body::before{content:'';position:fixed;inset:0;z-index:1;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");background-size:200px;pointer-events:none;opacity:.5;}

        .shell{position:fixed;inset:0;z-index:2;display:flex;flex-direction:column;}

        .topbar{height:60px;display:flex;align-items:center;padding:0 28px;border-bottom:1px solid var(--border);background:rgba(8,12,20,.6);backdrop-filter:blur(20px);gap:14px;flex-shrink:0;}
        .logo-mark{width:32px;height:32px;border-radius:9px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:14px;box-shadow:0 0 14px rgba(99,179,237,.3);}
        .top-title{font-family:'Syne',sans-serif;font-size:1em;font-weight:700;flex:1;}
        .back-btn{display:flex;align-items:center;gap:6px;padding:7px 14px;border-radius:9px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:.82em;font-weight:500;cursor:pointer;transition:all .2s;}
        .back-btn:hover{color:var(--text);border-color:rgba(255,255,255,.14);}

        .content{flex:1;overflow-y:auto;padding:28px 20px;}
        .content::-webkit-scrollbar{width:3px;}
        .content::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}

        .inner{max-width:760px;margin:0 auto;}

        /* Score hero */
        .score-hero{background:linear-gradient(135deg,rgba(99,179,237,.07),rgba(159,122,234,.07));border:1px solid rgba(99,179,237,.12);border-radius:24px;padding:32px;margin-bottom:22px;position:relative;overflow:hidden;display:flex;align-items:center;gap:32px;animation:card-in .5s ease both;}
        @keyframes card-in{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
        .score-hero-glow{position:absolute;top:-60px;right:-40px;width:250px;height:250px;background:radial-gradient(circle,rgba(99,179,237,.09),transparent 70%);pointer-events:none;}
        @media(max-width:600px){.score-hero{flex-direction:column;text-align:center;gap:20px;}}

        /* Donut score */
        .score-donut-wrap{flex-shrink:0;position:relative;}
        .score-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;}
        .score-center-num{font-family:'Syne',sans-serif;font-size:1.6em;font-weight:800;line-height:1;}
        .score-center-lbl{font-size:.65em;color:var(--muted);}

        .score-details{flex:1;min-width:0;}
        .score-result-label{font-size:.75em;font-weight:700;letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px;display:flex;align-items:center;gap:8px;}
        .score-result-label::before{content:'';display:inline-block;width:14px;height:1px;}
        .score-title{font-family:'Syne',sans-serif;font-size:1.7em;font-weight:800;line-height:1.2;margin-bottom:8px;}
        .score-sub{font-size:.88em;color:var(--muted);margin-bottom:20px;max-width:340px;line-height:1.5;}

        .score-stats{display:flex;gap:20px;flex-wrap:wrap;}
        .score-stat{text-align:center;}
        .score-stat-num{font-family:'Syne',sans-serif;font-size:1.5em;font-weight:800;}
        .score-stat-lbl{font-size:.72em;color:var(--muted);}

        /* Answer review */
        .review-title{font-family:'Syne',sans-serif;font-size:1em;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--muted);margin-bottom:16px;display:flex;align-items:center;gap:8px;}
        .review-title::after{content:'';flex:1;height:1px;background:var(--border);}
        .review-grid{display:flex;flex-direction:column;gap:10px;margin-bottom:24px;}

        .review-item{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px 18px;position:relative;overflow:hidden;transition:all .25s;animation:card-in .4s both;}
        .review-item::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:3px 0 0 3px;}
        .review-item.correct::before{background:var(--accent3);box-shadow:0 0 8px var(--accent3);}
        .review-item.wrong::before{background:var(--accent5);box-shadow:0 0 8px var(--accent5);}
        .review-item.skipped::before{background:var(--muted);}
        .review-item:hover{background:rgba(255,255,255,.06);}

        .review-item-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:8px;}
        .review-q-num{font-size:.7em;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);}
        .review-badge{font-size:.7em;font-weight:700;padding:3px 10px;border-radius:20px;white-space:nowrap;}
        .review-item.correct .review-badge{background:rgba(104,211,145,.1);color:var(--accent3);border:1px solid rgba(104,211,145,.2);}
        .review-item.wrong   .review-badge{background:rgba(251,113,133,.1);color:var(--accent5);border:1px solid rgba(251,113,133,.2);}
        .review-item.skipped .review-badge{background:rgba(107,116,148,.1);color:var(--muted);border:1px solid rgba(107,116,148,.2);}

        .review-q-text{font-size:.87em;font-weight:600;line-height:1.4;margin-bottom:10px;}
        .review-answers{display:flex;flex-direction:column;gap:5px;}
        .review-ans-row{display:flex;align-items:center;gap:9px;font-size:.8em;}
        .review-ans-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
        .review-ans-text{color:var(--muted);}
        .review-ans-text.correct{color:var(--accent3);font-weight:600;}
        .review-ans-text.wrong{color:var(--accent5);}

        /* Actions */
        .result-actions{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;padding-bottom:20px;}
        .action-btn{display:flex;align-items:center;gap:8px;padding:12px 24px;border-radius:12px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-family:'DM Sans',sans-serif;font-size:.88em;font-weight:600;cursor:pointer;transition:all .3s;position:relative;overflow:hidden;}
        .action-btn:hover{background:rgba(255,255,255,.07);border-color:rgba(255,255,255,.14);transform:translateY(-2px);}
        .action-btn.cert{background:linear-gradient(135deg,#f6ad55,#ed8936);border-color:transparent;color:#080c14;font-family:'Syne',sans-serif;font-weight:800;box-shadow:0 4px 20px rgba(246,173,85,.3);}
        .action-btn.cert:hover{box-shadow:0 8px 30px rgba(246,173,85,.45);transform:translateY(-2px);}
        .action-btn.primary{background:linear-gradient(135deg,var(--accent),var(--accent2));border-color:transparent;color:#080c14;font-family:'Syne',sans-serif;font-weight:800;box-shadow:0 4px 20px rgba(99,179,237,.25);}
        .action-btn.primary:hover{box-shadow:0 8px 30px rgba(99,179,237,.35);}

        .ripple{position:absolute;border-radius:50%;background:rgba(255,255,255,.12);transform:scale(0);animation:rip .6s linear;pointer-events:none;}
        @keyframes rip{to{transform:scale(4);opacity:0}}
    </style>
</head>
<body>
<canvas id="bgCanvas"></canvas>
<div class="shell">
    <div class="topbar">
        <div class="logo-mark">📊</div>
        <div class="top-title">Quiz Results</div>
        <button class="back-btn" onclick="window.location.href='student_dashboard.html'">← Dashboard</button>
    </div>

    <div class="content">
        <div class="inner" id="resultsInner">
            <!-- Filled by JS -->
        </div>
    </div>
</div>

<script>
/* CANVAS */
const cv=document.getElementById('bgCanvas'),ctx=cv.getContext('2d');
let W,H;
const resize=()=>{W=cv.width=window.innerWidth;H=cv.height=window.innerHeight;};
resize();window.addEventListener('resize',resize);
class P{constructor(){this.reset(true)}reset(i){this.x=Math.random()*W;this.y=i?Math.random()*H:H+5;this.vx=(Math.random()-.5)*.25;this.vy=-(Math.random()*.3+.08);this.r=Math.random()*1.2+.2;this.life=Math.random()*.6+.2;this.ml=this.life;this.col=Math.random()>.5?'99,179,237':'104,211,145';}upd(){this.x+=this.vx;this.y+=this.vy;this.life-=.0012;if(this.life<=0||this.y<-8)this.reset(false);}drw(){const a=(this.life/this.ml)*.5;ctx.beginPath();ctx.arc(this.x,this.y,this.r,0,Math.PI*2);ctx.fillStyle=`rgba(${this.col},${a})`;ctx.fill();}}
class Orb{constructor(){this.x=Math.random()*W;this.y=Math.random()*H;this.r=Math.random()*160+80;this.vx=(Math.random()-.5)*.09;this.vy=(Math.random()-.5)*.09;this.col=Math.random()>.5?'99,179,237':'104,211,145';this.a=Math.random()*.02+.006;}upd(){this.x+=this.vx;this.y+=this.vy;if(this.x<-this.r)this.x=W+this.r;if(this.x>W+this.r)this.x=-this.r;if(this.y<-this.r)this.y=H+this.r;if(this.y>H+this.r)this.y=-this.r;}drw(){const g=ctx.createRadialGradient(this.x,this.y,0,this.x,this.y,this.r);g.addColorStop(0,`rgba(${this.col},${this.a})`);g.addColorStop(1,'transparent');ctx.beginPath();ctx.arc(this.x,this.y,this.r,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();}}
const pts=Array.from({length:70},()=>new P()),orbs=Array.from({length:3},()=>new Orb());
(function loop(){ctx.clearRect(0,0,W,H);orbs.forEach(o=>{o.upd();o.drw();});pts.forEach(p=>{p.upd();p.drw();});requestAnimationFrame(loop);})();

/* QUIZ QUESTIONS (same as quiz page) */
const QUESTIONS=[
    {q:"Which of the following is NOT a feature of OOP?",opts:["Encapsulation","Polymorphism","Compilation","Inheritance"],ans:2,cat:"OOP Concepts"},
    {q:"What is the output of: System.out.println(10 + 20 + \"Java\");",opts:["30Java","1020Java","Java30","1030"],ans:0,cat:"Basics"},
    {q:"Which keyword prevents method overriding?",opts:["static","abstract","final","private"],ans:2,cat:"OOP Concepts"},
    {q:"What does JVM stand for?",opts:["Java Virtual Machine","Java Variable Method","Java Verified Module","Java Visual Memory"],ans:0,cat:"Java Architecture"},
    {q:"Which collection maintains insertion order and allows duplicates?",opts:["HashSet","TreeSet","ArrayList","HashMap"],ans:2,cat:"Collections"},
    {q:"What is autoboxing in Java?",opts:["Converting int to float","Automatic conversion of primitive to wrapper class","Boxing a class in another class","None of the above"],ans:1,cat:"Java Features"},
    {q:"Which exception is thrown when dividing by zero?",opts:["NullPointerException","ArithmeticException","NumberFormatException","IllegalArgumentException"],ans:1,cat:"Exception Handling"},
    {q:"What is the default value of an int variable?",opts:["null","0","undefined","-1"],ans:1,cat:"Basics"},
    {q:"Which keyword is used to inherit a class?",opts:["implements","inherits","extends","super"],ans:2,cat:"OOP Concepts"},
    {q:"What is a functional interface in Java 8?",opts:["Interface with multiple abstract methods","Interface with exactly one abstract method","Interface with no methods","Interface with only static methods"],ans:1,cat:"Java 8+"},
    {q:"Which is the correct lambda syntax?",opts:["(x) -> x * 2","(x) => x * 2","lambda x: x * 2","x -> { return x * 2 }"],ans:0,cat:"Java 8+"},
    {q:"What does 'synchronized' ensure?",opts:["Faster execution","Thread safety","Memory efficiency","Code reuse"],ans:1,cat:"Multithreading"},
    {q:"Which design pattern is used by Singleton?",opts:["Factory","Observer","Singleton","Builder"],ans:2,cat:"Design Patterns"},
    {q:"What does 'volatile' ensure?",opts:["Makes variable constant","Ensures visibility across threads","Prevents garbage collection","Speeds up access"],ans:1,cat:"Multithreading"},
    {q:"Which method must be implemented for Runnable?",opts:["start()","execute()","run()","thread()"],ans:2,cat:"Multithreading"},
    {q:"What does JDBC stand for?",opts:["Java Data Base Connectivity","Java Dynamic Base Connection","Java Database Core","Java Direct Base Connect"],ans:0,cat:"JDBC"},
    {q:"Which SQL operation retrieves data?",opts:["INSERT","UPDATE","SELECT","DELETE"],ans:2,cat:"JDBC"},
    {q:"What is the Stream API used for?",opts:["File I/O operations","Processing sequences of elements","Network communication","GUI development"],ans:1,cat:"Java 8+"},
    {q:"Which annotation marks a Spring REST controller?",opts:["@Component","@Service","@RestController","@Repository"],ans:2,cat:"Spring Framework"},
    {q:"What is the purpose of the 'Optional' class?",opts:["Replace null values","Improve performance","Handle concurrency","Enable lambda"],ans:0,cat:"Java 8+"},
    {q:"Which GC is default in Java 11+?",opts:["Serial GC","Parallel GC","G1 GC","CMS GC"],ans:2,cat:"Java Architecture"},
    {q:"What is method overloading?",opts:["Same name, different return type only","Same name, different parameters","Two classes with same method","Overriding parent method"],ans:1,cat:"OOP Concepts"},
    {q:"Which interface makes a class serializable?",opts:["Cloneable","Comparable","Serializable","Iterable"],ans:2,cat:"Java Features"},
    {q:"Difference between '==' and '.equals()'?",opts:["No difference","'==' compares references, '.equals()' compares content","'==' compares content, '.equals()' compares references","Both compare content"],ans:1,cat:"Basics"},
    {q:"Which Spring annotation injects dependencies automatically?",opts:["@Inject","@Resource","@Autowired","@Component"],ans:2,cat:"Spring Framework"},
];

/* RENDER RESULTS */
window.addEventListener('load',()=>{
    let data=JSON.parse(sessionStorage.getItem('quizResults'));
    if(!data){
        // Demo fallback
        const ans=QUESTIONS.map((_,i)=>i%3===2?-1:i%4===1?99:QUESTIONS[i].ans);
        let sc=0; ans.forEach((a,i)=>{if(a===QUESTIONS[i].ans)sc++;});
        data={score:sc,total:25,pct:Math.round(sc/25*100),timeUsed:840,answers:ans};
    }

    const {score,total,pct,timeUsed,answers}=data;
    const wrong=answers.filter((a,i)=>a>=0&&a!==QUESTIONS[i].ans).length;
    const skipped=answers.filter(a=>a<0).length;
    const mins=Math.floor(timeUsed/60),secs=timeUsed%60;

    let grade,gradeColor,emoji,resultTitle,resultSub;
    if(pct>=90){grade='A+';gradeColor='#68d391';emoji='🏆';resultTitle='Outstanding!';resultSub='Exceptional performance. You have mastered Advance Java.';}
    else if(pct>=80){grade='A';gradeColor='#63b3ed';emoji='🎉';resultTitle='Excellent Work!';resultSub='Great command of Java concepts. Keep up the momentum.';}
    else if(pct>=70){grade='B+';gradeColor='#9f7aea';emoji='👍';resultTitle='Good Job!';resultSub='Solid performance. Review a few concepts to reach the next level.';}
    else if(pct>=60){grade='B';gradeColor='#f6ad55';emoji='📚';resultTitle='Keep Going!';resultSub='Decent effort. Revisit the topics you missed to strengthen your knowledge.';}
    else{grade='C';gradeColor='#fb7185';emoji='💪';resultTitle='Keep Practicing!';resultSub='Don\'t give up! Review the material and retake the quiz.';}

    const inner=document.getElementById('resultsInner');

    // Score Hero
    inner.innerHTML=`
    <div class="score-hero">
        <div class="score-hero-glow"></div>
        <div class="score-donut-wrap">
            <svg width="140" height="140" viewBox="0 0 140 140" id="donutSvg"></svg>
            <div class="score-center">
                <div class="score-center-num" style="color:${gradeColor}">${pct}%</div>
                <div class="score-center-lbl">Score</div>
            </div>
        </div>
        <div class="score-details">
            <div class="score-result-label" style="color:${gradeColor};--c:${gradeColor}">
                <span style="background:${gradeColor};width:14px;height:1px;display:inline-block"></span>
                ${emoji} Grade ${grade}
            </div>
            <div class="score-title">${resultTitle}</div>
            <p class="score-sub">${resultSub}</p>
            <div class="score-stats">
                <div class="score-stat"><div class="score-stat-num" style="color:#68d391">${score}</div><div class="score-stat-lbl">Correct</div></div>
                <div class="score-stat"><div class="score-stat-num" style="color:#fb7185">${wrong}</div><div class="score-stat-lbl">Wrong</div></div>
                <div class="score-stat"><div class="score-stat-num" style="color:#6b7494">${skipped}</div><div class="score-stat-lbl">Skipped</div></div>
                <div class="score-stat"><div class="score-stat-num" style="color:#f6ad55">${mins}m ${String(secs).padStart(2,'0')}s</div><div class="score-stat-lbl">Time Used</div></div>
            </div>
        </div>
    </div>`;

    // Donut chart
    buildDonut(score,wrong,skipped,gradeColor);

    // Review
    inner.innerHTML+=`<div class="review-title">Answer Review</div><div class="review-grid" id="reviewGrid"></div>`;
    const grid=inner.querySelector('#reviewGrid');
    const letters=['A','B','C','D'];
    QUESTIONS.forEach((q,i)=>{
        const userAns=answers[i];
        const isCorrect=userAns===q.ans;
        const isSkipped=userAns<0;
        const cls=isSkipped?'skipped':isCorrect?'correct':'wrong';
        const badge=isSkipped?'Skipped':isCorrect?'✓ Correct':'✗ Wrong';
        const div=document.createElement('div');
        div.className=`review-item ${cls}`;
        div.style.animationDelay=(i*.025)+'s';
        div.innerHTML=`
            <div class="review-item-head">
                <div class="review-q-num">Q${i+1} · ${q.cat}</div>
                <div class="review-badge">${badge}</div>
            </div>
            <div class="review-q-text">${q.q}</div>
            <div class="review-answers">
                ${isSkipped?`<div class="review-ans-row"><div class="review-ans-dot" style="background:#6b7494"></div><div class="review-ans-text">Not answered · Correct: ${letters[q.ans]}. ${q.opts[q.ans]}</div></div>`
                :isCorrect?`<div class="review-ans-row"><div class="review-ans-dot" style="background:#68d391"></div><div class="review-ans-text correct">${letters[userAns]}. ${q.opts[userAns]}</div></div>`
                :`<div class="review-ans-row"><div class="review-ans-dot" style="background:#fb7185"></div><div class="review-ans-text wrong">Your answer: ${letters[userAns]}. ${q.opts[userAns]}</div></div>
                 <div class="review-ans-row"><div class="review-ans-dot" style="background:#68d391"></div><div class="review-ans-text correct">Correct: ${letters[q.ans]}. ${q.opts[q.ans]}</div></div>`}
            </div>`;
        grid.appendChild(div);
    });

    // Actions
    inner.innerHTML+=`
    <div class="result-actions">
        <button class="action-btn" onclick="window.location.href='assignment-quiz.html'">🔄 Retake Quiz</button>
        <button class="action-btn cert" onclick="goToCert()">🏆 Generate Certificate</button>
        <button class="action-btn primary" onclick="window.location.href='student_dashboard.html'">→ Back to Dashboard</button>
    </div>`;

    // Ripple
    inner.querySelectorAll('.action-btn').forEach(btn=>{
        btn.addEventListener('click',function(e){const r=this.getBoundingClientRect(),s=document.createElement('span');s.className='ripple';s.style.cssText=`width:60px;height:60px;left:${e.clientX-r.left-30}px;top:${e.clientY-r.top-30}px`;this.appendChild(s);setTimeout(()=>s.remove(),700);});
    });
});

function goToCert(){
    // Pass quiz score data to certificate page
    const res=JSON.parse(sessionStorage.getItem('quizResults'));
    if(res) sessionStorage.setItem('quizResults', JSON.stringify(res));
    window.location.href='certificate.html';
}

function buildDonut(correct,wrong,skipped,mainColor){
    const svg=document.getElementById('donutSvg');
    if(!svg)return;
    const total=correct+wrong+skipped;
    const cx2=70,cy2=70,r=58,inner=40;
    const segs=[{val:correct,col:'#68d391'},{val:wrong,col:'#fb7185'},{val:skipped,col:'#2a3048'}];
    let angle=-Math.PI/2;
    segs.forEach(s=>{
        if(s.val===0)return;
        const sweep=(s.val/total)*Math.PI*2;
        const x1=cx2+r*Math.cos(angle),y1=cy2+r*Math.sin(angle);
        angle+=sweep;
        const x2=cx2+r*Math.cos(angle),y2=cy2+r*Math.sin(angle);
        const xi1=cx2+inner*Math.cos(angle-sweep),yi1=cy2+inner*Math.sin(angle-sweep);
        const xi2=cx2+inner*Math.cos(angle),yi2=cy2+inner*Math.sin(angle);
        const lg=sweep>Math.PI?1:0;
        const path=document.createElementNS('http://www.w3.org/2000/svg','path');
        path.setAttribute('d',`M${x1},${y1} A${r},${r} 0 ${lg} 1 ${x2},${y2} L${xi2},${yi2} A${inner},${inner} 0 ${lg} 0 ${xi1},${yi1} Z`);
        path.setAttribute('fill',s.col);
        path.setAttribute('opacity','0.9');
        svg.appendChild(path);
    });
}
</script>
</body>
</html>
