<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduPortal — Student Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root{--bg:#080c14;--surface:rgba(255,255,255,0.04);--surface-hover:rgba(255,255,255,0.07);--border:rgba(255,255,255,0.08);--border-glow:rgba(99,179,237,0.35);--accent:#63b3ed;--accent2:#9f7aea;--accent3:#68d391;--text:#e8eaf0;--muted:#6b7494;}
        *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
        html,body{width:100%;height:100%;overflow:hidden;font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);}
        #bgCanvas{position:fixed;inset:0;z-index:0;pointer-events:none;}
        body::before{content:'';position:fixed;inset:0;z-index:1;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");background-size:200px;pointer-events:none;opacity:.5;}

        .page{position:fixed;inset:0;z-index:2;display:flex;align-items:center;justify-content:center;padding:20px;}

        .card{width:100%;max-width:420px;background:rgba(10,15,25,0.85);border:1px solid var(--border);border-radius:24px;padding:36px 32px;backdrop-filter:blur(24px);box-shadow:0 40px 100px rgba(0,0,0,.5);animation:card-in .5s cubic-bezier(.4,0,.2,1) both;position:relative;overflow:hidden;}
        @keyframes card-in{from{opacity:0;transform:translateY(24px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}
        .card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--accent),var(--accent2),transparent);opacity:.5;}

        /* Glow orb behind card */
        .card-glow{position:absolute;top:-80px;left:50%;transform:translateX(-50%);width:300px;height:300px;background:radial-gradient(circle,rgba(99,179,237,.06),transparent 70%);pointer-events:none;}

        /* Logo */
        .card-logo{display:flex;align-items:center;gap:10px;margin-bottom:28px;}
        .logo-mark{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:16px;box-shadow:0 0 18px rgba(99,179,237,.35);animation:logo-float 3s ease-in-out infinite;}
        @keyframes logo-float{0%,100%{transform:translateY(0) rotate(0)}50%{transform:translateY(-3px) rotate(5deg)}}
        .logo-name{font-family:'Syne',sans-serif;font-size:1em;font-weight:800;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}

        /* Tabs */
        .tabs{display:flex;background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:12px;padding:4px;margin-bottom:28px;gap:4px;}
        .tab{flex:1;padding:9px;border-radius:9px;border:none;background:transparent;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:.87em;font-weight:600;cursor:pointer;transition:all .25s;}
        .tab.active{background:rgba(99,179,237,.12);color:var(--accent);border:1px solid rgba(99,179,237,.2);}

        /* Heading */
        .card-title{font-family:'Syne',sans-serif;font-size:1.4em;font-weight:800;margin-bottom:5px;}
        .card-sub{font-size:.83em;color:var(--muted);margin-bottom:24px;}

        /* Fields */
        .field{margin-bottom:14px;}
        .field label{display:block;font-size:.73em;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);margin-bottom:6px;}
        .field-wrap{position:relative;}
        .field input{width:100%;padding:11px 14px 11px 40px;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:11px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.9em;outline:none;transition:all .25s;}
        .field input:focus{border-color:var(--border-glow);background:rgba(99,179,237,.04);box-shadow:0 0 0 3px rgba(99,179,237,.07);}
        .field input::placeholder{color:var(--muted);}
        .field-icon{position:absolute;left:13px;top:50%;transform:translateY(-50%);font-size:.9em;pointer-events:none;}

        /* Submit */
        .submit-btn{width:100%;padding:13px;border-radius:12px;border:none;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#080c14;font-family:'Syne',sans-serif;font-size:.95em;font-weight:800;cursor:pointer;transition:all .3s cubic-bezier(.4,0,.2,1);margin-top:6px;position:relative;overflow:hidden;letter-spacing:.02em;}
        .submit-btn:hover{box-shadow:0 8px 30px rgba(99,179,237,.35);transform:translateY(-2px);}
        .submit-btn:active{transform:translateY(0);}
        .submit-btn.loading{pointer-events:none;opacity:.7;}

        /* Error */
        .error-msg{background:rgba(251,113,133,.08);border:1px solid rgba(251,113,133,.2);border-radius:10px;padding:10px 14px;font-size:.82em;color:#fc8181;margin-bottom:14px;display:none;animation:shake .35s ease;}
        .error-msg.show{display:block;}
        @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}

        /* Success */
        .success-msg{background:rgba(104,211,145,.08);border:1px solid rgba(104,211,145,.2);border-radius:10px;padding:10px 14px;font-size:.82em;color:var(--accent3);margin-bottom:14px;display:none;}
        .success-msg.show{display:block;}

        /* Back link */
        .back-link{text-align:center;margin-top:20px;font-size:.8em;color:var(--muted);}
        .back-link a{color:var(--accent);text-decoration:none;font-weight:600;transition:color .2s;}
        .back-link a:hover{color:var(--accent2);}

        /* Ripple */
        .ripple{position:absolute;border-radius:50%;background:rgba(255,255,255,.15);transform:scale(0);animation:rip .6s linear;pointer-events:none;}
        @keyframes rip{to{transform:scale(4);opacity:0}}
    </style>
</head>
<body>
<canvas id="bgCanvas"></canvas>
<div class="page">
    <div class="card">
        <div class="card-glow"></div>
        <div class="card-logo">
            <div class="logo-mark">📚</div>
            <div class="logo-name">EduPortal</div>
        </div>

        <div class="tabs">
            <button class="tab active" onclick="switchTab('login',this)">Sign In</button>
            <button class="tab" onclick="switchTab('signup',this)">Create Account</button>
        </div>

        <!-- LOGIN -->
        <div id="loginForm">
            <div class="card-title">Welcome back</div>
            <div class="card-sub">Sign in to your student account</div>
            <div class="error-msg" id="loginError"></div>
            <div class="success-msg" id="loginSuccess"></div>
            <div class="field">
                <label>Student ID</label>
                <div class="field-wrap">
                    <span class="field-icon">🎓</span>
                    <input type="text" id="loginId" placeholder="Enter your student ID" autocomplete="username">
                </div>
            </div>
            <div class="field">
                <label>Password</label>
                <div class="field-wrap">
                    <span class="field-icon">🔒</span>
                    <input type="password" id="loginPass" placeholder="Enter your password" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()">
                </div>
            </div>
            <button class="submit-btn" id="loginBtn" onclick="doLogin()">Sign In →</button>
        </div>

        <!-- SIGNUP -->
        <div id="signupForm" style="display:none">
            <div class="card-title">Create account</div>
            <div class="card-sub">Register as a new student</div>
            <div class="error-msg" id="signupError"></div>
            <div class="success-msg" id="signupSuccess"></div>
            <div class="field">
                <label>Student ID</label>
                <div class="field-wrap">
                    <span class="field-icon">🎓</span>
                    <input type="text" id="signupId" placeholder="Choose a student ID">
                </div>
            </div>
            <div class="field">
                <label>Email</label>
                <div class="field-wrap">
                    <span class="field-icon">✉️</span>
                    <input type="email" id="signupEmail" placeholder="your@email.com">
                </div>
            </div>
            <div class="field">
                <label>Password</label>
                <div class="field-wrap">
                    <span class="field-icon">🔒</span>
                    <input type="password" id="signupPass" placeholder="Create a password" onkeydown="if(event.key==='Enter')doSignup()">
                </div>
            </div>
            <button class="submit-btn" id="signupBtn" onclick="doSignup()">Create Account →</button>
        </div>

        <div class="back-link">← <a href="index.html">Back to role selection</a></div>
    </div>
</div>

<script src="script.js"></script>
<script>
/* CANVAS */
const cv=document.getElementById('bgCanvas'),ctx=cv.getContext('2d');
let W,H;
const resize=()=>{W=cv.width=window.innerWidth;H=cv.height=window.innerHeight;};
resize();window.addEventListener('resize',resize);
class P{constructor(){this.reset(true)}reset(i){this.x=Math.random()*W;this.y=i?Math.random()*H:H+5;this.vx=(Math.random()-.5)*.25;this.vy=-(Math.random()*.35+.08);this.r=Math.random()*1.3+.2;this.life=Math.random()*.6+.2;this.ml=this.life;this.col=Math.random()>.5?'99,179,237':'159,122,234';}upd(){this.x+=this.vx;this.y+=this.vy;this.life-=.0012;if(this.life<=0||this.y<-8)this.reset(false);}drw(){const a=(this.life/this.ml)*.6;ctx.beginPath();ctx.arc(this.x,this.y,this.r,0,Math.PI*2);ctx.fillStyle=`rgba(${this.col},${a})`;ctx.fill();}}
class Orb{constructor(){this.x=Math.random()*W;this.y=Math.random()*H;this.r=Math.random()*180+80;this.vx=(Math.random()-.5)*.1;this.vy=(Math.random()-.5)*.1;this.col=Math.random()>.5?'99,179,237':'159,122,234';this.a=Math.random()*.02+.007;}upd(){this.x+=this.vx;this.y+=this.vy;if(this.x<-this.r)this.x=W+this.r;if(this.x>W+this.r)this.x=-this.r;if(this.y<-this.r)this.y=H+this.r;if(this.y>H+this.r)this.y=-this.r;}drw(){const g=ctx.createRadialGradient(this.x,this.y,0,this.x,this.y,this.r);g.addColorStop(0,`rgba(${this.col},${this.a})`);g.addColorStop(1,'transparent');ctx.beginPath();ctx.arc(this.x,this.y,this.r,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();}}
const pts=Array.from({length:80},()=>new P()),orbs=Array.from({length:4},()=>new Orb());
(function loop(){ctx.clearRect(0,0,W,H);orbs.forEach(o=>{o.upd();o.drw();});pts.forEach(p=>{p.upd();p.drw();});for(let i=0;i<pts.length;i++){for(let j=i+1;j<pts.length;j++){const dx=pts[i].x-pts[j].x,dy=pts[i].y-pts[j].y,d=Math.sqrt(dx*dx+dy*dy);if(d<80){const a=(1-d/80)*.06;ctx.beginPath();ctx.moveTo(pts[i].x,pts[i].y);ctx.lineTo(pts[j].x,pts[j].y);ctx.strokeStyle=`rgba(99,179,237,${a})`;ctx.lineWidth=.5;ctx.stroke();}}}requestAnimationFrame(loop);})();

/* Ripple */
document.querySelectorAll('.submit-btn').forEach(btn=>{
    btn.addEventListener('click',function(e){const r=this.getBoundingClientRect(),s=document.createElement('span');s.className='ripple';s.style.cssText=`width:80px;height:80px;left:${e.clientX-r.left-40}px;top:${e.clientY-r.top-40}px`;this.appendChild(s);setTimeout(()=>s.remove(),700);});
});

/* Tabs */
function switchTab(tab,el){
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    el.classList.add('active');
    document.getElementById('loginForm').style.display=tab==='login'?'block':'none';
    document.getElementById('signupForm').style.display=tab==='signup'?'block':'none';
}

/* Login */
function doLogin(){
    const id=document.getElementById('loginId').value.trim();
    const pass=document.getElementById('loginPass').value;
    const errEl=document.getElementById('loginError');
    const sucEl=document.getElementById('loginSuccess');
    errEl.classList.remove('show'); sucEl.classList.remove('show');
    if(!id||!pass){errEl.textContent='Please fill in all fields.';errEl.classList.add('show');return;}
    const students=JSON.parse(localStorage.getItem('students'))||{};
    if(!students[id]){errEl.textContent='Student ID not found. Please sign up first.';errEl.classList.add('show');return;}
    if(students[id].password!==pass){errEl.textContent='Incorrect password. Please try again.';errEl.classList.add('show');return;}
    sucEl.textContent='Login successful! Redirecting…';sucEl.classList.add('show');
    localStorage.setItem('currentUser',JSON.stringify({userId:id,role:'student'}));
    setTimeout(()=>window.location.href='success.html',800);
}

/* Signup */
function doSignup(){
    const id=document.getElementById('signupId').value.trim();
    const email=document.getElementById('signupEmail').value.trim();
    const pass=document.getElementById('signupPass').value;
    const errEl=document.getElementById('signupError');
    const sucEl=document.getElementById('signupSuccess');
    errEl.classList.remove('show');sucEl.classList.remove('show');
    if(!id||!email||!pass){errEl.textContent='Please fill in all fields.';errEl.classList.add('show');return;}
    if(pass.length<6){errEl.textContent='Password must be at least 6 characters.';errEl.classList.add('show');return;}
    const students=JSON.parse(localStorage.getItem('students'))||{};
    if(students[id]){errEl.textContent='This Student ID is already taken.';errEl.classList.add('show');return;}
    students[id]={password:pass,email,createdAt:new Date().toLocaleDateString()};
    localStorage.setItem('students',JSON.stringify(students));
    sucEl.textContent='Account created! You can now sign in.';sucEl.classList.add('show');
    setTimeout(()=>switchTab('login',document.querySelector('.tab')),1200);
}
</script>
</body>
</html>
