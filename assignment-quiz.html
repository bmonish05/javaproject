<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduPortal — Java Quiz</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root{--bg:#080c14;--surface:rgba(255,255,255,0.04);--surface-hover:rgba(255,255,255,0.07);--border:rgba(255,255,255,0.08);--border-glow:rgba(246,173,85,0.35);--accent:#f6ad55;--accent2:#ed8936;--accent-s:#63b3ed;--accent2s:#9f7aea;--accent3:#68d391;--text:#e8eaf0;--muted:#6b7494;}
        *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
        html,body{width:100%;height:100%;overflow:hidden;font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);}
        #bgCanvas{position:fixed;inset:0;z-index:0;pointer-events:none;}
        body::before{content:'';position:fixed;inset:0;z-index:1;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");background-size:200px;pointer-events:none;opacity:.5;}

        .shell{position:fixed;inset:0;z-index:2;display:flex;flex-direction:column;}

        /* TOPBAR */
        .topbar{height:60px;display:flex;align-items:center;padding:0 28px;border-bottom:1px solid var(--border);background:rgba(8,12,20,.6);backdrop-filter:blur(20px);gap:16px;flex-shrink:0;}
        .logo-mark{width:32px;height:32px;border-radius:9px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:14px;box-shadow:0 0 14px rgba(246,173,85,.3);}
        .top-title{font-family:'Syne',sans-serif;font-size:1em;font-weight:700;flex:1;}
        .top-title span{color:var(--muted);font-weight:500;font-size:.88em;}

        /* Timer */
        .timer-wrap{display:flex;align-items:center;gap:8px;padding:6px 14px;background:var(--surface);border:1px solid var(--border);border-radius:20px;}
        .timer-icon{font-size:.85em;}
        .timer-text{font-family:'Syne',sans-serif;font-size:.85em;font-weight:700;}
        .timer-text.warn{color:var(--accent);}
        .timer-text.danger{color:#fc8181;animation:blink .5s ease-in-out infinite;}
        @keyframes blink{0%,100%{opacity:1}50%{opacity:.4}}

        /* Progress bar */
        .quiz-progress{height:3px;background:rgba(255,255,255,.05);flex-shrink:0;}
        .quiz-progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width .4s ease;box-shadow:0 0 8px rgba(246,173,85,.4);}

        /* BODY */
        .quiz-body{flex:1;display:flex;align-items:flex-start;justify-content:center;overflow-y:auto;padding:28px 20px;}
        .quiz-body::-webkit-scrollbar{width:3px;}
        .quiz-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}

        .quiz-card{width:100%;max-width:680px;background:rgba(10,15,25,.85);border:1px solid var(--border);border-radius:24px;padding:32px;backdrop-filter:blur(20px);box-shadow:0 30px 80px rgba(0,0,0,.5);animation:card-in .4s ease both;position:relative;overflow:hidden;}
        @keyframes card-in{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
        .quiz-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--accent),transparent);opacity:.4;}

        /* Question header */
        .q-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px;}
        .q-counter{font-size:.75em;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);}
        .q-category{font-size:.72em;padding:3px 10px;border-radius:20px;background:rgba(246,173,85,.1);color:var(--accent);border:1px solid rgba(246,173,85,.2);font-weight:600;}

        /* Dot indicators */
        .q-dots{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:20px;}
        .q-dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.08);transition:all .3s;cursor:pointer;}
        .q-dot.answered{background:var(--accent);}
        .q-dot.current{background:rgba(246,173,85,.4);box-shadow:0 0 6px var(--accent);transform:scale(1.3);}

        /* Question text */
        .q-text{font-family:'Syne',sans-serif;font-size:1.1em;font-weight:700;line-height:1.5;margin-bottom:24px;color:var(--text);}

        /* Options */
        .options{display:flex;flex-direction:column;gap:10px;margin-bottom:28px;}
        .option{display:flex;align-items:center;gap:14px;padding:14px 18px;border-radius:13px;border:1px solid var(--border);background:rgba(255,255,255,.02);cursor:pointer;transition:all .25s cubic-bezier(.4,0,.2,1);position:relative;overflow:hidden;}
        .option::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(246,173,85,.08),rgba(246,173,85,.02));opacity:0;transition:opacity .25s;}
        .option:hover{border-color:rgba(246,173,85,.3);transform:translateX(4px);}
        .option:hover::before{opacity:1;}
        .option.selected{border-color:var(--border-glow);background:rgba(246,173,85,.08);box-shadow:0 0 20px rgba(246,173,85,.08);}
        .option.selected::before{opacity:1;}
        .option.correct{border-color:rgba(104,211,145,.4);background:rgba(104,211,145,.08);box-shadow:0 0 20px rgba(104,211,145,.1);}
        .option.wrong{border-color:rgba(251,113,133,.4);background:rgba(251,113,133,.08);}
        .option-letter{width:30px;height:30px;border-radius:8px;background:rgba(255,255,255,.06);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-size:.82em;font-weight:700;flex-shrink:0;transition:all .25s;}
        .option.selected .option-letter{background:rgba(246,173,85,.2);border-color:var(--accent);color:var(--accent);}
        .option.correct .option-letter{background:rgba(104,211,145,.2);border-color:var(--accent3);color:var(--accent3);}
        .option.wrong .option-letter{background:rgba(251,113,133,.2);border-color:#fc8181;color:#fc8181;}
        .option-text{font-size:.9em;flex:1;line-height:1.4;}

        /* Nav buttons */
        .q-nav{display:flex;align-items:center;justify-content:space-between;gap:12px;}
        .nav-btn{display:flex;align-items:center;gap:7px;padding:11px 22px;border-radius:11px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-family:'DM Sans',sans-serif;font-size:.87em;font-weight:600;cursor:pointer;transition:all .25s;position:relative;overflow:hidden;}
        .nav-btn:hover{background:var(--surface-hover);border-color:rgba(255,255,255,.14);transform:scale(1.02);}
        .nav-btn.primary{background:linear-gradient(135deg,var(--accent),var(--accent2));border-color:transparent;color:#080c14;font-family:'Syne',sans-serif;font-weight:800;box-shadow:0 4px 20px rgba(246,173,85,.25);}
        .nav-btn.primary:hover{box-shadow:0 8px 30px rgba(246,173,85,.35);transform:translateY(-2px);}
        .nav-btn:disabled{opacity:.3;cursor:not-allowed;transform:none;}
        .q-score-wrap{font-family:'Syne',sans-serif;font-size:.82em;font-weight:700;color:var(--muted);}
        .q-score-wrap span{color:var(--accent3);}

        /* Ripple */
        .ripple{position:absolute;border-radius:50%;background:rgba(246,173,85,.15);transform:scale(0);animation:rip .6s linear;pointer-events:none;}
        @keyframes rip{to{transform:scale(4);opacity:0}}

        /* Back btn */
        .back-btn{display:flex;align-items:center;gap:6px;padding:6px 12px;border-radius:9px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:.82em;font-weight:500;cursor:pointer;transition:all .2s;}
        .back-btn:hover{color:var(--text);border-color:rgba(255,255,255,.14);}
    </style>
</head>
<body>
<canvas id="bgCanvas"></canvas>
<div class="shell">
    <div class="topbar">
        <div class="logo-mark">☕</div>
        <div class="top-title">Advance Java Quiz <span>· 25 Questions</span></div>
        <div class="timer-wrap">
            <span class="timer-icon">⏱</span>
            <span class="timer-text" id="timerText">30:00</span>
        </div>
        <button class="back-btn" onclick="history.back()">← Back</button>
    </div>

    <div class="quiz-progress">
        <div class="quiz-progress-fill" id="quizProgressFill" style="width:4%"></div>
    </div>

    <div class="quiz-body">
        <div class="quiz-card">
            <div class="q-header">
                <div class="q-counter" id="qCounter">Question 1 of 25</div>
                <div class="q-category" id="qCategory">OOP Concepts</div>
            </div>

            <div class="q-dots" id="qDots"></div>

            <div class="q-text" id="qText"></div>

            <div class="options" id="optionsContainer"></div>

            <div class="q-nav">
                <button class="nav-btn" id="prevBtn" onclick="prevQ()" disabled>← Previous</button>
                <div class="q-score-wrap">Answered: <span id="answeredCount">0</span>/25</div>
                <button class="nav-btn primary" id="nextBtn" onclick="nextQ()">Next →</button>
            </div>
        </div>
    </div>
</div>

<script>
/* CANVAS */
const cv=document.getElementById('bgCanvas'),ctx=cv.getContext('2d');
let W,H;
const resize=()=>{W=cv.width=window.innerWidth;H=cv.height=window.innerHeight;};
resize();window.addEventListener('resize',resize);
class P{constructor(){this.reset(true)}reset(i){this.x=Math.random()*W;this.y=i?Math.random()*H:H+5;this.vx=(Math.random()-.5)*.25;this.vy=-(Math.random()*.3+.08);this.r=Math.random()*1.2+.2;this.life=Math.random()*.6+.2;this.ml=this.life;this.col=Math.random()>.5?'246,173,85':'237,137,54';}upd(){this.x+=this.vx;this.y+=this.vy;this.life-=.0012;if(this.life<=0||this.y<-8)this.reset(false);}drw(){const a=(this.life/this.ml)*.5;ctx.beginPath();ctx.arc(this.x,this.y,this.r,0,Math.PI*2);ctx.fillStyle=`rgba(${this.col},${a})`;ctx.fill();}}
class Orb{constructor(){this.x=Math.random()*W;this.y=Math.random()*H;this.r=Math.random()*160+80;this.vx=(Math.random()-.5)*.09;this.vy=(Math.random()-.5)*.09;this.col=Math.random()>.5?'246,173,85':'237,137,54';this.a=Math.random()*.02+.006;}upd(){this.x+=this.vx;this.y+=this.vy;if(this.x<-this.r)this.x=W+this.r;if(this.x>W+this.r)this.x=-this.r;if(this.y<-this.r)this.y=H+this.r;if(this.y>H+this.r)this.y=-this.r;}drw(){const g=ctx.createRadialGradient(this.x,this.y,0,this.x,this.y,this.r);g.addColorStop(0,`rgba(${this.col},${this.a})`);g.addColorStop(1,'transparent');ctx.beginPath();ctx.arc(this.x,this.y,this.r,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();}}
const pts=Array.from({length:60},()=>new P()),orbs=Array.from({length:3},()=>new Orb());
(function loop(){ctx.clearRect(0,0,W,H);orbs.forEach(o=>{o.upd();o.drw();});pts.forEach(p=>{p.upd();p.drw();});requestAnimationFrame(loop);})();

/* QUIZ DATA */
const QUESTIONS=[
    {q:"Which of the following is NOT a feature of Object-Oriented Programming?",opts:["Encapsulation","Polymorphism","Compilation","Inheritance"],ans:2,cat:"OOP Concepts"},
    {q:"What is the output of: System.out.println(10 + 20 + \"Java\");",opts:["30Java","1020Java","Java30","1030"],ans:0,cat:"Basics"},
    {q:"Which keyword is used to prevent method overriding in Java?",opts:["static","abstract","final","private"],ans:2,cat:"OOP Concepts"},
    {q:"What does JVM stand for?",opts:["Java Virtual Machine","Java Variable Method","Java Verified Module","Java Visual Memory"],ans:0,cat:"Java Architecture"},
    {q:"Which collection class allows duplicate elements and maintains insertion order?",opts:["HashSet","TreeSet","ArrayList","HashMap"],ans:2,cat:"Collections"},
    {q:"What is autoboxing in Java?",opts:["Converting int to float","Automatic conversion of primitive to wrapper class","Boxing a class in another class","None of the above"],ans:1,cat:"Java Features"},
    {q:"Which exception is thrown when dividing by zero in Java?",opts:["NullPointerException","ArithmeticException","NumberFormatException","IllegalArgumentException"],ans:1,cat:"Exception Handling"},
    {q:"What is the default value of an int variable in Java?",opts:["null","0","undefined","-1"],ans:1,cat:"Basics"},
    {q:"Which keyword is used to inherit a class in Java?",opts:["implements","inherits","extends","super"],ans:2,cat:"OOP Concepts"},
    {q:"What is a functional interface in Java 8?",opts:["Interface with multiple abstract methods","Interface with exactly one abstract method","Interface with no methods","Interface with only static methods"],ans:1,cat:"Java 8+"},
    {q:"Which of the following is the correct syntax for a lambda expression?",opts:["(x) -> x * 2","(x) => x * 2","lambda x: x * 2","x -> { return x * 2 }"],ans:0,cat:"Java 8+"},
    {q:"What does the 'synchronized' keyword ensure in Java?",opts:["Faster execution","Thread safety","Memory efficiency","Code reuse"],ans:1,cat:"Multithreading"},
    {q:"Which design pattern is used by the Singleton class?",opts:["Factory","Observer","Singleton","Builder"],ans:2,cat:"Design Patterns"},
    {q:"What is the purpose of the 'volatile' keyword in Java?",opts:["Makes variable constant","Ensures visibility across threads","Prevents garbage collection","Speeds up access"],ans:1,cat:"Multithreading"},
    {q:"Which method must be implemented when using the Runnable interface?",opts:["start()","execute()","run()","thread()"],ans:2,cat:"Multithreading"},
    {q:"What does JDBC stand for?",opts:["Java Data Base Connectivity","Java Dynamic Base Connection","Java Database Core","Java Direct Base Connect"],ans:0,cat:"JDBC"},
    {q:"Which SQL operation is used to retrieve data from a database?",opts:["INSERT","UPDATE","SELECT","DELETE"],ans:2,cat:"JDBC"},
    {q:"What is the Stream API used for in Java 8?",opts:["File I/O operations","Processing sequences of elements","Network communication","GUI development"],ans:1,cat:"Java 8+"},
    {q:"Which annotation is used to mark a Spring bean as a REST controller?",opts:["@Component","@Service","@RestController","@Repository"],ans:2,cat:"Spring Framework"},
    {q:"What is the purpose of the 'Optional' class in Java 8?",opts:["Replace null values","Improve performance","Handle concurrency","Enable lambda"],ans:0,cat:"Java 8+"},
    {q:"Which garbage collector is used by default in Java 11+?",opts:["Serial GC","Parallel GC","G1 GC","CMS GC"],ans:2,cat:"Java Architecture"},
    {q:"What is method overloading in Java?",opts:["Same method name, different return type only","Same method name, different parameters","Two classes with same method","Overriding parent method"],ans:1,cat:"OOP Concepts"},
    {q:"Which interface must be implemented to make a class serializable?",opts:["Cloneable","Comparable","Serializable","Iterable"],ans:2,cat:"Java Features"},
    {q:"What is the difference between '==' and '.equals()' in Java?",opts:["No difference","'==' compares references, '.equals()' compares content","'==' compares content, '.equals()' compares references","Both compare content"],ans:1,cat:"Basics"},
    {q:"Which Spring annotation is used to inject dependencies automatically?",opts:["@Inject","@Resource","@Autowired","@Component"],ans:2,cat:"Spring Framework"},
];

/* STATE */
let current=0,answers=new Array(25).fill(-1),timerSecs=1800,timerInterval;

/* Init */
window.addEventListener('load',()=>{
    buildDots();renderQ();startTimer();
});

function buildDots(){
    const d=document.getElementById('qDots');
    d.innerHTML='';
    QUESTIONS.forEach((_,i)=>{
        const dot=document.createElement('div');
        dot.className='q-dot'+(i===current?' current':answers[i]>=0?' answered':'');
        dot.onclick=()=>jumpTo(i);
        d.appendChild(dot);
    });
}

function renderQ(){
    const q=QUESTIONS[current];
    document.getElementById('qCounter').textContent=`Question ${current+1} of 25`;
    document.getElementById('qCategory').textContent=q.cat;
    document.getElementById('qText').textContent=q.q;
    document.getElementById('quizProgressFill').style.width=((current+1)/25*100)+'%';

    const opts=document.getElementById('optionsContainer');
    opts.innerHTML='';
    const letters=['A','B','C','D'];
    q.opts.forEach((opt,i)=>{
        const div=document.createElement('div');
        div.className='option'+(answers[current]===i?' selected':'');
        div.innerHTML=`<div class="option-letter">${letters[i]}</div><div class="option-text">${opt}</div>`;
        div.onclick=function(e){
            if(answers[current]>=0)return;
            ripple(this,e);
            answers[current]=i;
            updateAnswered();
            buildDots();
            renderQ();
        };
        opts.appendChild(div);
    });

    document.getElementById('prevBtn').disabled=current===0;
    document.getElementById('nextBtn').textContent=current===24?'Submit Quiz ✓':'Next →';
    document.getElementById('nextBtn').className='nav-btn primary'+(current===24?' submit':'');
    buildDots();
}

function prevQ(){if(current>0){current--;renderQ();}}
function nextQ(){
    if(current<24){current++;renderQ();}
    else{submitQuiz();}
}
function jumpTo(i){current=i;renderQ();}

function updateAnswered(){
    document.getElementById('answeredCount').textContent=answers.filter(a=>a>=0).length;
}

function startTimer(){
    timerInterval=setInterval(()=>{
        timerSecs--;
        const m=Math.floor(timerSecs/60),s=timerSecs%60;
        const txt=document.getElementById('timerText');
        txt.textContent=String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
        if(timerSecs<=300)txt.className='timer-text warn';
        if(timerSecs<=60)txt.className='timer-text danger';
        if(timerSecs<=0){clearInterval(timerInterval);submitQuiz();}
    },1000);
}

function submitQuiz(){
    clearInterval(timerInterval);
    let score=0;
    answers.forEach((a,i)=>{if(a===QUESTIONS[i].ans)score++;});
    const pct=Math.round((score/25)*100);
    const timeUsed=1800-timerSecs;
    sessionStorage.setItem('quizResults',JSON.stringify({score,total:25,pct,timeUsed,answers}));
    window.location.href='quiz-results.html';
}

function ripple(el,e){
    const r=el.getBoundingClientRect(),s=document.createElement('span');
    s.className='ripple';s.style.cssText=`width:60px;height:60px;left:${e.clientX-r.left-30}px;top:${e.clientY-r.top-30}px`;
    el.appendChild(s);setTimeout(()=>s.remove(),700);
}
document.querySelectorAll('.nav-btn').forEach(btn=>{
    btn.addEventListener('click',function(e){ripple(this,e);});
});
</script>
</body>
</html>
