<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Java Quiz</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .quiz-container {
            max-width: 900px;
            margin: 20px auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
        }

        .quiz-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #f0f0f0;
        }

        .quiz-title h1 {
            margin: 0;
            color: #333;
            font-size: 1.8em;
        }

        .quiz-info {
            display: flex;
            gap: 30px;
            align-items: center;
        }

        .score-box {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 25px;
            border-radius: 8px;
            text-align: center;
        }

        .score-box p {
            margin: 0;
            font-size: 0.9em;
        }

        .score-box h2 {
            margin: 5px 0 0 0;
            font-size: 1.8em;
        }

        .question-container {
            margin: 30px 0;
            padding: 25px;
            background: #f9f9f9;
            border-left: 4px solid #667eea;
            border-radius: 8px;
        }

        .question-number {
            color: #667eea;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .question-text {
            font-size: 1.1em;
            color: #333;
            margin-bottom: 20px;
            font-weight: 600;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option {
            padding: 15px;
            border: 2px solid #ddd;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            background: white;
        }

        .option:hover {
            border-color: #667eea;
            background: #f0f7ff;
        }

        .option input[type="radio"] {
            margin-right: 10px;
            cursor: pointer;
        }

        .option.selected {
            border-color: #667eea;
            background: #e8eeff;
        }

        .option.correct {
            border-color: #27ae60;
            background: #d4edda;
            color: #155724;
        }

        .option.incorrect {
            border-color: #e74c3c;
            background: #f8d7da;
            color: #721c24;
        }

        .quiz-navigation {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 2px solid #f0f0f0;
            flex-wrap: wrap;
            gap: 15px;
        }

        .nav-buttons {
            display: flex;
            gap: 10px;
        }

        .btn-quiz {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn-prev {
            background: #e0e0e0;
            color: #333;
        }

        .btn-prev:hover {
            background: #d0d0d0;
        }

        .btn-prev:disabled {
            background: #f0f0f0;
            color: #ccc;
            cursor: not-allowed;
        }

        .btn-next {
            background: #667eea;
            color: white;
        }

        .btn-next:hover {
            background: #764ba2;
        }

        .quiz-actions {
            display: flex;
            gap: 10px;
        }

        .btn-submit {
            background: #27ae60;
            color: white;
            padding: 12px 30px;
            font-size: 1.1em;
        }

        .btn-submit:hover {
            background: #229954;
        }

        .btn-end {
            background: #e74c3c;
            color: white;
            padding: 12px 30px;
            font-size: 1.1em;
        }

        .btn-end:hover {
            background: #c0392b;
        }

        .question-progress {
            text-align: center;
            color: #666;
        }

        .progress-indicator {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin: 20px 0;
            padding: 20px;
            background: #f9f9f9;
            border-radius: 8px;
        }

        .progress-dot {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            background: #ddd;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 0.9em;
            font-weight: bold;
            transition: all 0.3s;
            border: 2px solid transparent;
        }

        .progress-dot:hover {
            transform: scale(1.1);
        }

        .progress-dot.answered {
            background: #667eea;
            color: white;
        }

        .progress-dot.current {
            border-color: #667eea;
            background: white;
            color: #667eea;
        }

        .progress-dot.unanswered {
            background: #f0f0f0;
            color: #999;
        }

        .instructions {
            background: #e3f2fd;
            border-left: 4px solid #2196f3;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 5px;
            color: #1565c0;
        }

        .back-to-dashboard {
            display: inline-block;
            margin-bottom: 20px;
        }

        .back-to-dashboard a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s;
        }

        .back-to-dashboard a:hover {
            color: #764ba2;
        }

        @media (max-width: 768px) {
            .quiz-container {
                padding: 15px;
            }

            .quiz-header {
                flex-direction: column;
                gap: 15px;
            }

            .quiz-info {
                flex-direction: column;
                gap: 15px;
                width: 100%;
            }

            .score-box {
                width: 100%;
            }

            .progress-indicator {
                gap: 5px;
            }

            .progress-dot {
                width: 28px;
                height: 28px;
                font-size: 0.75em;
            }

            .quiz-navigation {
                flex-direction: column;
            }

            .nav-buttons {
                width: 100%;
            }

            .nav-buttons button {
                flex: 1;
            }

            .quiz-actions {
                width: 100%;
            }

            .quiz-actions button {
                flex: 1;
            }

            .question-progress {
                width: 100%;
            }
        }
    </style>
</head>
<body style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px;">
    <div class="back-to-dashboard">
        <a href="student_dashboard.html">← Back to Dashboard</a>
    </div>

    <div class="quiz-container">
        <!-- Quiz Header -->
        <div class="quiz-header">
            <div class="quiz-title">
                <h1>Advanced Java Quiz</h1>
                <p style="color: #666; margin: 5px 0 0 0;">25 Questions | Time Limit: Unlimited</p>
            </div>
            <div class="quiz-info">
                <div class="score-box">
                    <p>Your Score</p>
                    <h2 id="currentScore">0/25</h2>
                </div>
            </div>
        </div>

        <div class="instructions">
            <strong>ℹ️ Instructions:</strong> Select the correct answer for each question. Your answers will be highlighted in green (correct) or red (incorrect) after submission.
        </div>

        <!-- Progress Indicator -->
        <div class="progress-indicator" id="progressIndicator"></div>

        <!-- Question Container -->
        <div class="question-container" id="questionContainer"></div>

        <!-- Navigation -->
        <div class="quiz-navigation">
            <div class="nav-buttons">
                <button class="btn-quiz btn-prev" onclick="previousQuestion()" id="prevBtn">← Previous</button>
                <button class="btn-quiz btn-next" onclick="nextQuestion()" id="nextBtn">Next →</button>
            </div>
            <div class="quiz-actions">
                <button class="btn-quiz btn-submit" onclick="submitQuiz()" id="submitBtn">Submit Quiz</button>
                <button class="btn-quiz btn-end" onclick="endQuiz()" id="endBtn">End Quiz</button>
            </div>
            <div class="question-progress">
                <span id="questionCount">Question 1 of 25</span>
            </div>
        </div>
    </div>


<script>
    // Advanced Java Quiz Questions (25 Questions)
    const quizQuestions = [
        {
            question: "What is the correct syntax to declare a variable in Java?",
            options: ["var name = 'value';", "int age = 25;", "declare int age;", "name age = 25;"],
            correct: 1
        },
        {
            question: "Which of the following is NOT a primitive data type in Java?",
            options: ["int", "String", "boolean", "double"],
            correct: 1
        },
        {
            question: "What is the purpose of the 'final' keyword in Java?",
            options: ["To make a class static", "To prevent modification of variables, methods, or classes", "To initialize variables", "To declare abstract methods"],
            correct: 1
        },
        {
            question: "Which method is used to start a thread in Java?",
            options: ["run()", "start()", "execute()", "init()"],
            correct: 1
        },
        {
            question: "What is an interface in Java?",
            options: ["A class with abstract methods", "A blueprint for a class with abstract methods and constants", "A way to create multiple inheritance", "A and B"],
            correct: 3
        },
        {
            question: "What is the difference between ArrayList and LinkedList?",
            options: ["ArrayList is faster for access, LinkedList is faster for insertion/deletion", "LinkedList is faster for access", "No difference", "ArrayList cannot store null values"],
            correct: 0
        },
        {
            question: "Which of the following is the correct way to create a HashMap in Java?",
            options: ["new HashMap<String, Integer>();", "new HashMap(String, Integer);", "HashMap<String> map;", "HashMap map = new HashMap;"],
            correct: 0
        },
        {
            question: "What is the purpose of the 'synchronized' keyword?",
            options: ["To make code run faster", "To prevent multiple threads from accessing a method/block simultaneously", "To declare a constant", "To initialize variables"],
            correct: 1
        },
        {
            question: "What is the correct syntax for exception handling in Java?",
            options: ["try-catch-finally", "catch-try-finally", "handle-exception", "exception-catch"],
            correct: 0
        },
        {
            question: "Which class is the superclass of all classes in Java?",
            options: ["String", "Object", "Class", "System"],
            correct: 1
        },
        {
            question: "What is the purpose of the 'static' keyword?",
            options: ["To make variables constant", "To make methods/variables belong to the class rather than instances", "To prevent inheritance", "To declare abstract methods"],
            correct: 1
        },
        {
            question: "What is method overloading?",
            options: ["Creating multiple methods with the same name but different parameters", "Creating methods with different names", "Creating abstract methods", "Inheriting methods from parent class"],
            correct: 0
        },
        {
            question: "What is the difference between '==' and '.equals()' for String comparison?",
            options: ["'==' compares content, '.equals()' compares reference", "'==' compares reference, '.equals()' compares content", "No difference", "'==' is for primitives only"],
            correct: 1
        },
        {
            question: "What is a lambda expression in Java?",
            options: ["A variable declaration", "A short way to write anonymous functions", "A type of loop", "A way to define classes"],
            correct: 1
        },
        {
            question: "Which is NOT a feature of inheritance in Java?",
            options: ["Code reusability", "Method overriding", "Multiple inheritance", "Polymorphism"],
            correct: 2
        },
        {
            question: "What is the difference between 'throw' and 'throws'?",
            options: ["'throw' throws an exception, 'throws' declares it", "'throws' throws an exception, 'throw' declares it", "No difference", "'throw' is for checked, 'throws' for unchecked"],
            correct: 0
        },
        {
            question: "What is the correct way to create an array in Java?",
            options: ["int array[10];", "int[] array = new int[10];", "array int[10];", "int array[] = 10;"],
            correct: 1
        },
        {
            question: "What is an abstract class?",
            options: ["A class that cannot be instantiated and may contain abstract methods", "A class with no methods", "A class that cannot be inherited", "A class with only static methods"],
            correct: 0
        },
        {
            question: "Which collection class is synchronized in Java?",
            options: ["HashMap", "ArrayList", "Vector", "HashSet"],
            correct: 2
        },
        {
            question: "What is the difference between '++i' and 'i++'?",
            options: ["No difference", "'++i' is prefix increment, 'i++' is postfix increment", "'i++' is faster", "'++i' only works in loops"],
            correct: 1
        },
        {
            question: "What is the purpose of the 'package' keyword in Java?",
            options: ["To declare a variable", "To group related classes and interfaces", "To import libraries", "To declare a class"],
            correct: 1
        },
        {
            question: "What is the correct syntax to handle multiple exceptions?",
            options: ["try-catch(Exception1, Exception2)", "try-catch(Exception1) catch(Exception2)", "try { } catch(Exception1 | Exception2)", "try { } catch-all"],
            correct: 2
        },
        {
            question: "What is the purpose of the 'volatile' keyword in Java?",
            options: ["To make variables constant", "To ensure visibility of changes to variables across threads", "To prevent inheritance", "To make methods abstract"],
            correct: 1
        },
        {
            question: "Which of the following is NOT a type of Java variable?",
            options: ["Instance variable", "Static variable", "Local variable", "Global variable"],
            correct: 3
        },
        {
            question: "What is the correct way to create a thread in Java?",
            options: ["Extend Thread class or implement Runnable interface", "Using new Thread()", "Using Thread.create()", "Using ThreadPool.newThread()"],
            correct: 0
        }
    ];

    let currentQuestion = 0;
    let userAnswers = new Array(quizQuestions.length).fill(-1);
    let answered = new Array(quizQuestions.length).fill(false);

    // Initialize Quiz
    document.addEventListener('DOMContentLoaded', function() {
        const currentUser = JSON.parse(localStorage.getItem('currentUser'));
        if (!currentUser || currentUser.role !== 'student') {
            window.location.href = 'index.html';
            return;
        }

        createProgressIndicator();
        displayQuestion();
    });

    // Create Progress Indicator
    function createProgressIndicator() {
        const indicator = document.getElementById('progressIndicator');
        indicator.innerHTML = '';

        for (let i = 0; i < quizQuestions.length; i++) {
            const dot = document.createElement('div');
            dot.className = 'progress-dot';
            if (i === 0) {
                dot.classList.add('current');
            }
            dot.textContent = i + 1;
            dot.onclick = () => goToQuestion(i);
            indicator.appendChild(dot);
        }
        updateProgressIndicator();
    }

    // Update Progress Indicator
    function updateProgressIndicator() {
        const dots = document.querySelectorAll('.progress-dot');
        dots.forEach((dot, index) => {
            dot.classList.remove('current', 'answered', 'unanswered');
            
            if (index === currentQuestion) {
                dot.classList.add('current');
            } else if (answered[index]) {
                dot.classList.add('answered');
            } else {
                dot.classList.add('unanswered');
            }
        });
    }

    // Display Current Question
    function displayQuestion() {
        const question = quizQuestions[currentQuestion];
        const container = document.getElementById('questionContainer');

        let optionsHTML = '';
        question.options.forEach((option, index) => {
            optionsHTML += `
                <label class="option ${userAnswers[currentQuestion] === index ? 'selected' : ''}">
                    <input 
                        type="radio" 
                        name="answer" 
                        value="${index}"
                        ${userAnswers[currentQuestion] === index ? 'checked' : ''}
                        onchange="selectAnswer(${index})"
                    >
                    ${option}
                </label>
            `;
        });

        container.innerHTML = `
            <div class="question-number">Question ${currentQuestion + 1} of ${quizQuestions.length}</div>
            <div class="question-text">${question.question}</div>
            <div class="options">${optionsHTML}</div>
        `;

        document.getElementById('questionCount').textContent = `Question ${currentQuestion + 1} of ${quizQuestions.length}`;
        document.getElementById('prevBtn').disabled = currentQuestion === 0;
        document.getElementById('nextBtn').style.display = currentQuestion === quizQuestions.length - 1 ? 'none' : 'block';

        updateProgressIndicator();
        updateScore();
    }

    // Select Answer
    function selectAnswer(index) {
        userAnswers[currentQuestion] = index;
        answered[currentQuestion] = true;
        updateProgressIndicator();
        updateScore();
    }

    // Navigate Questions
    function nextQuestion() {
        if (currentQuestion < quizQuestions.length - 1) {
            currentQuestion++;
            displayQuestion();
        }
    }

    function previousQuestion() {
        if (currentQuestion > 0) {
            currentQuestion--;
            displayQuestion();
        }
    }

    function goToQuestion(index) {
        currentQuestion = index;
        displayQuestion();
    }

    // Update Score
    function updateScore() {
        let correct = 0;
        userAnswers.forEach((answer, index) => {
            if (answer === quizQuestions[index].correct) {
                correct++;
            }
        });
        document.getElementById('currentScore').textContent = `${correct}/${quizQuestions.length}`;
    }

    // Submit Quiz
    function submitQuiz() {
        // Calculate results
        let correct = 0;
        userAnswers.forEach((answer, index) => {
            if (answer === quizQuestions[index].correct) {
                correct++;
            }
        });

        const results = {
            correctCount: correct,
            incorrectCount: quizQuestions.length - correct,
            totalQuestions: quizQuestions.length,
            percentage: Math.round((correct / quizQuestions.length) * 100),
            userAnswers: userAnswers,
            questions: quizQuestions
        };

        localStorage.setItem('quizResults', JSON.stringify(results));
        window.location.href = 'quiz-results.html';
    }

    // End Quiz Function
    function endQuiz() {
        localStorage.removeItem('quizResults');
        window.location.href = 'student_dashboard.html';
    }
</script>
</body>
</html>
